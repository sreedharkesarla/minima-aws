version: '3.9'

# Project name for Docker
name: documindai

services:
  mysql:
    image: mysql:8.0
    container_name: documindai-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${RDS_DB_NAME:-documindai_db}
      MYSQL_USER: ${RDS_DB_USER:-admin}
      MYSQL_PASSWORD: ${RDS_DB_PASSWORD:-admin123}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init_admin_db.sql:/docker-entrypoint-initdb.d/init_admin_db.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
    expose:
      - 6333
      - 6334
      - 6335
    volumes:
      - ./qdrant_data:/qdrant/storage
    env_file:
      - .env
    environment:
      QDRANT__LOG_LEVEL: "INFO"

  documindai-upload:
    build: ./documindai-upload
    volumes:
      - ./documindai-upload:/usr/src/app
    ports:
      - 8001:8000
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src
      - PYTHONUNBUFFERED=TRUE
      - PYTHONHTTPSVERIFY=0
      - CURL_CA_BUNDLE=
      - REQUESTS_CA_BUNDLE=
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - AWS_FILES_PATH=${AWS_FILES_PATH}
      - LOCAL_FILES_PATH=${LOCAL_FILES_PATH}
      - RDS_DB_INSTANCE=mysql
      - RDS_DB_NAME=${RDS_DB_NAME}
      - RDS_DB_USER=${RDS_DB_USER}
      - RDS_DB_PASSWORD=${RDS_DB_PASSWORD}
      - RDS_DB_PORT=3306
      - QDRANT_BOOTSTRAP=${QDRANT_BOOTSTRAP:-qdrant}
    depends_on:
      mysql:
        condition: service_healthy
      qdrant:
        condition: service_started

  documindai-index:
    build: ./documindai-index
    volumes:
      - ./documindai-index:/usr/src/app
    ports:
      - 8002:8000
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src
      - PYTHONUNBUFFERED=TRUE
      - PYTHONHTTPSVERIFY=0
      - CURL_CA_BUNDLE=
      - REQUESTS_CA_BUNDLE=
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
      - AWS_FILES_PATH=${AWS_FILES_PATH}
      - LOCAL_FILES_PATH=${LOCAL_FILES_PATH}
      - QDRANT_BOOTSTRAP=${QDRANT_BOOTSTRAP}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - EMBEDDING_MODEL_ID=${EMBEDDING_MODEL_ID}
      - EMBEDDING_SIZE=${EMBEDDING_SIZE}
      - RDS_DB_INSTANCE=${RDS_DB_INSTANCE}
      - RDS_DB_NAME=${RDS_DB_NAME}
      - RDS_DB_USER=${RDS_DB_USER}
      - RDS_DB_PASSWORD=${RDS_DB_PASSWORD}
      - RDS_DB_PORT=${RDS_DB_PORT}
    depends_on:
      mysql:
        condition: service_healthy
      documindai-upload:
        condition: service_started
      qdrant:
        condition: service_started

  documindai-chat:
    build: ./documindai-chat
    volumes:
      - ./documindai-chat:/usr/src/app
    env_file:
      - .env
    environment:
      - PYTHONPATH=/usr/src
      - PYTHONUNBUFFERED=TRUE
      - PYTHONHTTPSVERIFY=0
      - CURL_CA_BUNDLE=
      - REQUESTS_CA_BUNDLE=
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - QDRANT_BOOTSTRAP=${QDRANT_BOOTSTRAP}
      - QDRANT_COLLECTION=${QDRANT_COLLECTION}
      - EMBEDDING_MODEL_ID=${EMBEDDING_MODEL_ID}
      - CHAT_MODEL_ID=${CHAT_MODEL_ID}
    depends_on:
      qdrant:
        condition: service_started

  documindai-ui:
    build: ./documindai-ui
    volumes:
      - ./documindai-ui:/app
      - /app/node_modules
    ports:
      - 3000:3000
    environment:
      - VITE_UPLOAD_API_URL=http://localhost:8001
    depends_on:
      - documindai-upload
      - qdrant

  documindai-admin:
    build: ./documindai-admin
    ports:
      - 3001:80
    depends_on:
      - documindai-upload
      - documindai-index
      - documindai-chat
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  mysql_data:
    driver: local